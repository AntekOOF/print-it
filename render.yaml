services:
  - type: web
    name: print-it-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run db:init && npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: print-it-db
          property: connectionString
      - key: PUBLIC_CLIENT_URL
        value: https://print-it-to-fundit.netlify.app
      - key: PUBLIC_CLIENT_URLS
        value: https://print-it-to-fundit.netlify.app,http://localhost:5173,http://127.0.0.1:5173
      - key: PUBLIC_SERVER_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ADMIN_EMAIL
        value: admin@print-it.local
      - key: ADMIN_PASSWORD
        sync: false
      - key: MANUAL_GCASH_NUMBER
        value: "09771330538"
      - key: PAYMONGO_SECRET_KEY
        sync: false
      - key: PAYMONGO_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: Print-IT <no-reply@print-it.local>

databases:
  - name: print-it-db
    plan: free
    databaseName: print_it
    user: print_it_app
